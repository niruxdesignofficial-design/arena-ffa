<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>CZ Shooter — Admin</title>
<style>
  :root {
    --bg: #05070d; --panel: #0b111d; --line: #1b2740;
    --cyan: #29e0ff; --gold: #ffcf3a; --green: #6cf08a; --dim: #8fa3c4; --text: #eaf2ff;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0; background: radial-gradient(1200px 600px at 50% -10%, #0e1730, var(--bg));
    color: var(--text); font: 14px/1.5 ui-monospace, "SF Mono", Menlo, Consolas, monospace;
  }
  header {
    padding: 20px 24px; border-bottom: 1px solid var(--line);
    display: flex; align-items: center; gap: 16px; flex-wrap: wrap;
  }
  h1 { margin: 0; font-size: 22px; letter-spacing: 2px; }
  h1 .cy { color: var(--gold); text-shadow: 0 0 12px rgba(255,207,58,.4); }
  h1 .sh { color: var(--cyan); text-shadow: 0 0 12px rgba(41,224,255,.4); }
  .tag { font-size: 11px; color: var(--dim); border: 1px solid var(--line); padding: 3px 8px; border-radius: 4px; }
  .grow { flex: 1; }
  .tabs { display: flex; gap: 8px; padding: 14px 24px 0; }
  .tab {
    background: none; border: 1px solid var(--line); color: var(--dim); cursor: pointer;
    padding: 8px 16px; border-radius: 6px 6px 0 0; font: inherit; letter-spacing: 1px;
  }
  .tab.active { color: var(--text); border-color: var(--cyan); border-bottom-color: transparent; background: var(--panel); }
  main { padding: 18px 24px 60px; }
  .toolbar { display: flex; gap: 10px; align-items: center; margin-bottom: 14px; flex-wrap: wrap; }
  .btn {
    background: #10203a; border: 1px solid var(--cyan); color: var(--cyan); cursor: pointer;
    padding: 7px 13px; border-radius: 6px; font: inherit; text-decoration: none; display: inline-block;
  }
  .btn:hover { background: #16304f; }
  .btn.gold { border-color: var(--gold); color: var(--gold); }
  .muted { color: var(--dim); }
  .card {
    background: var(--panel); border: 1px solid var(--line); border-top: 3px solid var(--gold);
    border-radius: 8px; margin-bottom: 14px; overflow: hidden;
  }
  .card-h {
    display: flex; align-items: center; gap: 14px; padding: 12px 16px; cursor: pointer; flex-wrap: wrap;
  }
  .card-h .cid { color: var(--gold); font-weight: bold; letter-spacing: 1px; }
  .card-h .when { color: var(--dim); font-size: 12px; }
  .pill { font-size: 11px; color: var(--green); border: 1px solid #1e3a2a; background: #0c1a12; padding: 2px 8px; border-radius: 20px; }
  table { width: 100%; border-collapse: collapse; }
  th, td { text-align: left; padding: 8px 16px; border-top: 1px solid var(--line); }
  th { color: var(--dim); font-weight: normal; font-size: 12px; letter-spacing: 1px; }
  td.w { color: var(--cyan); }
  td.k { color: var(--gold); font-weight: bold; }
  .rank { color: var(--dim); }
  .empty { color: var(--dim); padding: 40px; text-align: center; border: 1px dashed var(--line); border-radius: 8px; }
  .hidden { display: none; }
  .warn { background: #2a1608; border: 1px solid #5a3410; color: #ffcf9a; padding: 10px 14px; border-radius: 6px; margin-bottom: 14px; font-size: 13px; }
</style>
</head>
<body>
  <header>
    <h1><span class="cy">CZ</span> <span class="sh">SHOOTER</span> · ADMIN</h1>
    <span class="tag" id="mode">…</span>
    <div class="grow"></div>
    <span class="tag">fee distribution console</span>
  </header>

  <div class="tabs">
    <button class="tab active" data-tab="snapshots">PODIUM SNAPSHOTS</button>
    <button class="tab" data-tab="leaderboard">ALL-TIME LEADERBOARD</button>
  </div>

  <main>
    <div id="warn" class="warn hidden"></div>

    <section id="snapshots">
      <div class="toolbar">
        <a class="btn gold" href="/export/snapshots.csv">⬇ Export all snapshots (CSV)</a>
        <button class="btn" onclick="load(true)">↻ Refresh</button>
        <span class="muted" id="snap-count"></span>
      </div>
      <div id="snap-list"></div>
    </section>

    <section id="leaderboard" class="hidden">
      <div class="toolbar">
        <a class="btn gold" href="/export/leaderboard.csv">⬇ Export leaderboard (CSV)</a>
        <button class="btn" onclick="load(true)">↻ Refresh</button>
        <span class="muted" id="lb-count"></span>
      </div>
      <div id="lb-table"></div>
    </section>
  </main>

<script>
const esc = (s) => String(s == null ? '' : s).replace(/[&<>"]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
const short = (w) => w && w.length > 12 ? w.slice(0, 6) + '…' + w.slice(-4) : w;

async function api(url) {
  // Usamos location.origin (sin credenciales) para que fetch funcione aunque
  // la página se haya abierto con user:pass@ en la URL. La auth Basic va sola.
  const r = await fetch(location.origin + url, { credentials: 'same-origin' });
  if (!r.ok) throw new Error(url + ' -> ' + r.status);
  return r.json();
}

function copyWallets(cycleId, wallets) {
  navigator.clipboard.writeText(wallets.join('\n')).then(() => {
    const el = document.getElementById('cp-' + cycleId);
    if (el) { el.textContent = '✓ copied'; setTimeout(() => el.textContent = 'Copy wallets', 1500); }
  });
}

function renderSnapshots(list) {
  document.getElementById('snap-count').textContent = list.length + ' cycle(s)';
  const box = document.getElementById('snap-list');
  if (!list.length) { box.innerHTML = '<div class="empty">No cycles archived yet. They appear as the game closes 25-min podiums.</div>'; return; }
  box.innerHTML = list.map((s) => {
    const winners = s.winners || [];
    const wallets = winners.map(w => w.wallet);
    const rows = winners.map(w => `<tr>
      <td class="rank">#${w.rank}</td>
      <td class="w" title="${esc(w.wallet)}">${esc(short(w.wallet))}</td>
      <td>${esc(w.name)}</td>
      <td class="k">${w.kills}</td>
      <td>${w.points}</td></tr>`).join('') ||
      '<tr><td colspan="5" class="muted" style="padding:16px">No eligible players this cycle (nobody had a wallet connected).</td></tr>';
    return `<div class="card">
      <div class="card-h" onclick="this.nextElementSibling.classList.toggle('hidden')">
        <span class="cid">${esc(s.cycleId)}</span>
        <span class="when">${esc(s.closedAt || '')}</span>
        <span class="pill">${winners.length} winners · ${s.eligibleCount || 0} eligible</span>
        <div class="grow"></div>
        <button class="btn" id="cp-${esc(s.cycleId)}" onclick="event.stopPropagation();copyWallets('${esc(s.cycleId)}', ${JSON.stringify(wallets).replace(/"/g,'&quot;')})">Copy wallets</button>
        <a class="btn" href="/export/${encodeURIComponent(s.cycleId)}.csv" onclick="event.stopPropagation()">CSV</a>
      </div>
      <div>
        <table><thead><tr><th>Rank</th><th>Wallet</th><th>Name</th><th>Kills</th><th>Points</th></tr></thead>
        <tbody>${rows}</tbody></table>
      </div>
    </div>`;
  }).join('');
}

function renderLeaderboard(list) {
  document.getElementById('lb-count').textContent = list.length + ' wallet(s)';
  const box = document.getElementById('lb-table');
  if (!list.length) { box.innerHTML = '<div class="empty">No wallets yet. Players appear here after they connect a wallet and get kills.</div>'; return; }
  const rows = list.map((r, i) => `<tr>
    <td class="rank">#${i + 1}</td>
    <td class="w" title="${esc(r.wallet)}">${esc(short(r.wallet))}</td>
    <td class="k">${r.total_kills}</td>
    <td>${esc(r.name || '')}</td>
    <td class="muted">${esc((r.last_seen || '').toString().slice(0, 19).replace('T', ' '))}</td></tr>`).join('');
  box.innerHTML = `<div class="card"><table>
    <thead><tr><th>#</th><th>Wallet</th><th>Total kills</th><th>Name</th><th>Last seen</th></tr></thead>
    <tbody>${rows}</tbody></table></div>`;
}

async function load(showSpin) {
  try {
    const [snaps, lb] = await Promise.all([api('/api/snapshots'), api('/api/leaderboard')]);
    renderSnapshots(snaps.snapshots || []);
    renderLeaderboard(lb.leaderboard || []);
    document.getElementById('mode').textContent = snaps.durable ? 'storage: durable' : 'storage: MEMORY (not durable!)';
    const warn = document.getElementById('warn');
    if (!snaps.durable) { warn.classList.remove('hidden'); warn.textContent = '⚠ DATABASE_URL not set — running in memory. Data will be LOST on restart. Set the Neon connection string.'; }
    else warn.classList.add('hidden');
  } catch (e) {
    document.getElementById('warn').classList.remove('hidden');
    document.getElementById('warn').textContent = 'Error loading data: ' + e.message;
  }
}

document.querySelectorAll('.tab').forEach((t) => t.onclick = () => {
  document.querySelectorAll('.tab').forEach(x => x.classList.toggle('active', x === t));
  document.getElementById('snapshots').classList.toggle('hidden', t.dataset.tab !== 'snapshots');
  document.getElementById('leaderboard').classList.toggle('hidden', t.dataset.tab !== 'leaderboard');
});

load();
setInterval(load, 30000); // auto-refresh cada 30s
</script>
</body>
</html>
