# Render Blueprint — deploys both pieces of ARENA FFA from this repo:
#  1) arena-ffa-server: the headless Godot game server (Docker, WebSocket).
#     Render injects PORT; the server reads it (Net.listen_port()).
#     Players connect to wss://arena-ffa-server-XXXX.onrender.com
#  2) arena-ffa-web: the static web client (build/web committed in the repo).
services:
  - type: web
    name: arena-ffa-server
    runtime: docker
    plan: free
    autoDeploy: true
    # Ranking global por wallet (para repartir fees): el server manda los kills
    # nuevos a una planilla de Google. Se cargan en el dashboard de Render
    # (Environment), NO en el repo, porque son secretos.
    envVars:
      - key: SCORE_WEBHOOK_URL   # URL del Web App de Google Apps Script
        sync: false
      - key: SCORE_SECRET        # clave compartida con el script (anti-spam)
        sync: false

  - type: web
    name: arena-ffa-web
    runtime: static
    buildCommand: ""
    staticPublishPath: build/web
    autoDeploy: true
