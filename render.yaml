# Render Blueprint — deploys both pieces of ARENA FFA from this repo:
#  1) arena-ffa-server: the headless Godot game server (Docker, WebSocket).
#     Render injects PORT; the server reads it (Net.listen_port()).
#     Players connect to wss://arena-ffa-server-XXXX.onrender.com
#  2) arena-ffa-web: the static web client (build/web committed in the repo).
services:
  - type: web
    name: arena-ffa-server
    runtime: docker
    plan: free
    autoDeploy: true
    # Ranking global + snapshots de podio (para repartir fees). El server manda
    # los datos a nuestro panel admin (POST /ingest). Se cargan en el dashboard
    # de Render (Environment), NO en el repo, porque son secretos.
    envVars:
      - key: SCORE_WEBHOOK_URL   # URL /ingest del panel admin (arena-ffa-admin)
        sync: false
      - key: SCORE_SECRET        # == INGEST_SECRET del panel
        sync: false
      - key: CYCLE_MINUTES       # (opcional) duración del ciclo de podio; default 25
        sync: false
      - key: SNAPSHOT_TOP_N      # (opcional) ganadores por snapshot; default 10
        sync: false

  - type: web
    name: arena-ffa-web
    runtime: static
    buildCommand: ""
    staticPublishPath: build/web
    autoDeploy: true

  # Panel admin (Node): recibe los datos del juego, los guarda en Postgres (Neon)
  # y los muestra con la marca CZ Shooter (snapshots + ranking + export CSV).
  - type: web
    name: arena-ffa-admin
    runtime: node
    rootDir: admin
    plan: free
    autoDeploy: true
    buildCommand: npm install
    startCommand: node server.js
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL    # connection string de Neon (Postgres)
        sync: false
      - key: INGEST_SECRET   # == SCORE_SECRET del server del juego
        sync: false
      - key: ADMIN_PASSWORD  # contraseña para entrar al panel
        sync: false
